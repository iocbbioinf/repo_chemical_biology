# Definition of metadata for a Mass Spectrum Dataset.
# Please do not add ccmm model here; add the ccmm_preset instead.
#
# A Dataset is a named collection of MS Runs (mzML files).
# Run-level metadata (instrument, software, samples, chromatograms, spectra)
# is stored in individual MSRun and Spectrum records that reference this Dataset.

# ---------------------------------------------------------------------------
# Metadata blueprint
# ---------------------------------------------------------------------------

Metadata:
  properties:

    title:
      type: fulltext+keyword
      label:
        en: Title
      help:
        en: Human-readable title of this mass spectrometry dataset.

    description:
      type: fulltext
      label:
        en: Description
      help:
        en: Free-text description of this mass spectrometry dataset.

    languages:
      type: array
      items:
        type: vocabulary
        vocabulary-type: languages
