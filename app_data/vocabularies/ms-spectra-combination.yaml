- id: MS:1000235
  title:
    en: total ion current chromatogram
  props:
    psi_ms_accession: MS:1000235
  description:
    en: Chromatogram obtained by plotting the sum of all ion intensities detected
      in each of a series of mass spectra against the retention time.
- id: MS:1000627
  title:
    en: selected ion current chromatogram
  props:
    psi_ms_accession: MS:1000627
  description:
    en: Chromatogram obtained by plotting the intensity of a single m/z value against
      the retention time.
- id: MS:1000628
