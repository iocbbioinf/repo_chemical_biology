- id: MS:1000294
  title:
    en: mass spectrum
  props:
    psi_ms_accession: MS:1000294
  description:
    en: A plot of the relative abundance of a beam or other collection of ions as
      a function of the mass-to-charge ratio (m/z).
- id: MS:1000322
  title:
    en: charge inversion mass spectrum
  props:
    psi_ms_accession: MS:1000322
  description:
    en: The measurement of the relative abundance of ions that result from a charge
      inversion reaction as a function of m/z.
- id: MS:1000325
  title:
    en: constant neutral gain spectrum
  props:
    psi_ms_accession: MS:1000325
  description:
    en: A spectrum formed of all product ions that have been produced by gain of a
      pre-selected neutral mass following the reaction with and addition of the gas
      in a collision cell.
- id: MS:1000326
  title:
    en: constant neutral loss spectrum
  props:
    psi_ms_accession: MS:1000326
  description:
    en: A spectrum formed of all product ions that have been produced with a selected
      m/z decrement from any precursor ions. The spectrum shown correlates to the
      precursor ion spectrum. See also neutral loss spectrum.
- id: MS:1000328
  title:
    en: e/2 mass spectrum
  props:
    psi_ms_accession: MS:1000328
  description:
    en: A mass spectrum obtained using a sector mass spectrometer in which the electric
      sector field E is set to half the value required to transmit the main ion-beam.
      This spectrum records the signal from doubly charged product ions of charge-stripping
      reactions.
- id: MS:1000341
  title:
    en: precursor ion spectrum
  props:
    psi_ms_accession: MS:1000341
  description:
    en: Spectrum generated by scanning precursor m/z while monitoring a fixed product
      m/z.
- id: MS:1000579
  title:
    en: MS1 spectrum
  props:
    psi_ms_accession: MS:1000579
  description:
    en: Mass spectrum created by a single-stage MS experiment or the first stage of
      a multi-stage experiment.
- id: MS:1000789
  title:
    en: enhanced multiply charged spectrum
  props:
    psi_ms_accession: MS:1000789
  description:
    en: MS1 spectrum that is enriched in multiply-charged ions compared to singly-charged
      ions.
- id: MS:1000580
  title:
    en: MSn spectrum
  props:
    psi_ms_accession: MS:1000580
  description:
    en: MSn refers to multi-stage MS2 experiments designed to record product ion spectra
      where n is the number of product ion stages (progeny ions). For ion traps, sequential
      MS/MS experiments can be undertaken where n &gt; 2 whereas for a simple triple
      quadrupole system n=2. Use the term ms level (MS:10005
- id: MS:1000790
  title:
    en: time-delayed fragmentation spectrum
  props:
    psi_ms_accession: MS:1000790
  description:
    en: MSn spectrum in which the product ions are collected after a time delay, which
      allows the observation of lower energy fragmentation processes after precursor
      ion activation.
- id: MS:1000581
  title:
    en: CRM spectrum
  props:
    psi_ms_accession: MS:1000581
  description:
    en: Spectrum generated from MSn experiment with three or more stages of m/z separation
      and in which a particular multi-step reaction path is monitored.
- id: MS:1000582
  title:
    en: SIM spectrum
  props:
    psi_ms_accession: MS:1000582
  description:
    en: Spectrum obtained with the operation of a mass spectrometer in which the abundances
      of one ion or several ions of specific m/z values are recorded rather than the
      entire mass spectrum (Selected Ion Monitoring).
- id: MS:1000583
  title:
    en: SRM spectrum
  props:
    psi_ms_accession: MS:1000583
  description:
    en: Spectrum obtained when data are acquired from specific product ions corresponding
      to m/z values of selected precursor ions a recorded via two or more stages of
      mass spectrometry. The precursor/product ion pair is called a transition pair.
      Data can be obtained for a single transition pair or multiple
- id: MS:1000804
  title:
    en: electromagnetic radiation spectrum
  props:
    psi_ms_accession: MS:1000804
  description:
    en: A plot of the relative intensity of electromagnetic radiation as a function
      of the wavelength.
- id: MS:1000805
  title:
    en: emission spectrum
  props:
    psi_ms_accession: MS:1000805
  description:
    en: A plot of the relative intensity of electromagnetic radiation emitted by atoms
      or molecules when excited.
- id: MS:1000806
  title:
    en: absorption spectrum
  props:
    psi_ms_accession: MS:1000806
  description:
    en: A plot of the relative intensity of electromagnetic radiation absorbed by
      atoms or molecules when excited.
- id: MS:1000928
  title:
    en: calibration spectrum
  props:
    psi_ms_accession: MS:1000928
  description:
    en: A spectrum derived from a special calibration source, rather than from the
      primary injected sample. A calibration spectrum is typically derived from a
      substance that can be used to correct systematic shift in m/z for spectra of
      the primary inject sample.
