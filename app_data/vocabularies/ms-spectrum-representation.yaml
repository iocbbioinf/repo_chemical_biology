- id: MS:1000127
  title:
    en: centroid spectrum
  props:
    psi_ms_accession: MS:1000127
  description:
    en: Processing of profile data to produce spectra that contains discrete peaks
      of zero width. Often used to reduce the size of dataset.
- id: MS:1000128
  title:
    en: profile spectrum
  props:
    psi_ms_accession: MS:1000128
  description:
    en: A profile mass spectrum is created when data is recorded with ion current
      (counts per second) on one axis and mass/charge ratio on another axis.
