- id: MS:1000133
  title:
    en: collision-induced dissociation
  props:
    psi_ms_accession: MS:1000133
  description:
    en: The dissociation of an ion after collisional excitation. The term collisional-activated
      dissociation is not recommended.
- id: MS:1000422
  title:
    en: beam-type collision-induced dissociation
  props:
    psi_ms_accession: MS:1000422
  description:
    en: A collision-induced dissociation process that occurs in a beam-type collision
      cell.
- id: MS:1002481
  title:
    en: higher energy beam-type collision-induced dissociation
  props:
    psi_ms_accession: MS:1002481
  description:
    en: A collision-induced dissociation process wherein the projectile ion has the
      translational energy higher than approximately 1000 eV.
- id: MS:1002678
  title:
    en: supplemental beam-type collision-induced dissociation
  props:
    psi_ms_accession: MS:1002678
  description:
    en: A supplemental collision-induced dissociation process that occurs in a beam-type
      collision cell in addition to another primary type of dissociation.
- id: MS:1002472
  title:
    en: trap-type collision-induced dissociation
  props:
    psi_ms_accession: MS:1002472
  description:
    en: A collision-induced dissociation process that occurs in a trap-type collision
      cell.
- id: MS:1002679
  title:
    en: supplemental collision-induced dissociation
  props:
    psi_ms_accession: MS:1002679
  description:
    en: The dissociation of an ion after supplemental collisional excitation.
- id: MS:1000134
  title:
    en: plasma desorption
  props:
    psi_ms_accession: MS:1000134
  description:
    en: The ionization of material in a solid sample by bombarding it with ionic or
      neutral atoms formed as a result of the fission of a suitable nuclide, typically
      252Cf. Synonymous with fission fragment ionization.
- id: MS:1000135
  title:
    en: post-source decay
  props:
    psi_ms_accession: MS:1000135
  description:
    en: A technique specific to reflectron time-of-flight mass spectrometers where
      product ions of metastable transitions or collision-induced dissociations generated
      in the drift tube prior to entering the reflectron are m/z separated to yield
      product ion spectra.
- id: MS:1000136
  title:
    en: surface-induced dissociation
  props:
    psi_ms_accession: MS:1000136
  description:
    en: Fragmentation that results from the collision of an ion with a surface.
- id: MS:1000242
  title:
    en: blackbody infrared radiative dissociation
  props:
    psi_ms_accession: MS:1000242
  description:
    en: A special case of infrared multiphoton dissociation wherein excitation of
      the reactant ion is caused by absorption of infrared photons radiating from
      heated blackbody surroundings, which are usually the walls of a vacuum chamber.
      See also infrared multiphoton dissociation.
- id: MS:1000250
  title:
    en: electron capture dissociation
  props:
    psi_ms_accession: MS:1000250
  description:
    en: A process in which a multiply protonated molecules interacts with a low energy
      electrons. Capture of the electron leads the liberation of energy and a reduction
      in charge state of the ion with the production of the (M + nH) (n-1)+ odd electron
      ion, which readily fragments.
- id: MS:1003294
  title:
    en: electron activated dissociation
  props:
    psi_ms_accession: MS:1003294
  description:
    en: A process to fragment ions in a high intensity electron beam which results
      in a dissociation of various analytes ranging from singly charged small molecules
      to multiply protonated proteins.
- id: MS:1000282
  title:
    en: sustained off-resonance irradiation
  props:
    psi_ms_accession: MS:1000282
  description:
    en: 'A technique associated with Fourier transform ion cyclotron resonance (FT-ICR)
      mass spectrometry to carry out ion/neutral reactions such as low-energy collision-induced
      dissociation. A radio-frequency electric field of slightly off-resonance to
      the cyclotron frequency of the reactant ion cyclically '
- id: MS:1000433
  title:
    en: low-energy collision-induced dissociation
  props:
    psi_ms_accession: MS:1000433
  description:
    en: A collision-induced dissociation process wherein the precursor ion has the
      translational energy lower than approximately 1000 eV. This process typically
      requires multiple collisions and the collisional excitation is cumulative.
- id: MS:1000435
  title:
    en: photodissociation
  props:
    psi_ms_accession: MS:1000435
  description:
    en: A process wherein the reactant ion is dissociated as a result of absorption
      of one or more photons.
- id: MS:1000262
  title:
    en: infrared multiphoton dissociation
  props:
    psi_ms_accession: MS:1000262
  description:
    en: Multiphoton ionization where the reactant ion dissociates as a result of the
      absorption of multiple infrared photons.
- id: MS:1003246
  title:
    en: ultraviolet photodissociation
  props:
    psi_ms_accession: MS:1003246
  description:
    en: Multiphoton ionization where the reactant ion dissociates as a result of the
      absorption of multiple UV photons.
- id: MS:1000598
  title:
    en: electron transfer dissociation
  props:
    psi_ms_accession: MS:1000598
  description:
    en: A process to fragment ions in a mass spectrometer by inducing fragmentation
      of cations (e.g. peptides or proteins) by transferring electrons from radical-anions.
- id: MS:1000599
  title:
    en: pulsed q dissociation
  props:
    psi_ms_accession: MS:1000599
  description:
    en: A process that involves precursor ion activation at high Q, a time delay to
      allow the precursor to fragment, then a rapid pulse to low Q where all fragment
      ions are trapped. The product ions can then be scanned out of the ion trap and
      detected.
- id: MS:1001880
  title:
    en: in-source collision-induced dissociation
  props:
    psi_ms_accession: MS:1001880
  description:
    en: The dissociation of an ion as a result of collisional excitation during ion
      transfer from an atmospheric pressure ion source and the mass spectrometer vacuum.
- id: MS:1002000
  title:
    en: LIFT
  props:
    psi_ms_accession: MS:1002000
  description:
    en: A Bruker&apos;s proprietary technique where molecular ions are initially accelerated
      at lower energy, then collide with inert gas in a collision cell that is then
      &apos;lifted&apos; to high potential. The use of inert gas is optional, as it
      could lift also fragments provided by LID.
- id: MS:1003247
  title:
    en: negative electron transfer dissociation
  props:
    psi_ms_accession: MS:1003247
  description:
    en: A process to fragment ions in a mass spectrometer by inducing fragmentation
      of anions (e.g. peptides or proteins) by transferring electrons to a radical-cation.
