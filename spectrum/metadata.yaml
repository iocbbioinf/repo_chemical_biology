# Definition of metadata for spectrum. Please do not add ccmm model here,
# add the ccmm_preset instead.        
Metadata:
  properties:                                                                                                                                                                                                                                                                   
    title:                                                                                                                                                                                                                                                                      
      type: fulltext+keyword                                                                                                                                                                                                                                                    
    attr1:
      type: fulltext+keyword
    languages:                                                                                                                                                                                                                                                                  
      type: array                                                                                                                                                                                                                                                               
      items:                                                                                                                                                                                                                                                                    
        type: vocabulary                                                                                                                                                                                                                                                        
        vocabulary-type: languages                                                                                                                                                                                                                                              
    embedding:                                                                                                                                                                                                                                                                  
      type: vector                                                                                                                                                                                                                                                              
      dims: 2
        
